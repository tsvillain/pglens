name: CI

on:
  pull_request:
  push:
    branches: [main, dev, '3.0.0']

permissions:
  contents: read

jobs:
  backend-unit:
    name: backend unit (node ${{ matrix.node }} · ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      # keytar pulls a native module; libsecret is needed on Linux.
      - if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsecret-1-dev
      - run: npm ci
      - run: npm test

  frontend-unit:
    name: frontend unit (node 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client-next
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client-next/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  backend-integration:
    name: backend integration (postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pglens
          POSTGRES_PASSWORD: pglens
          POSTGRES_DB: pglens_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pglens"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: sudo apt-get update && sudo apt-get install -y libsecret-1-dev
      - run: npm ci
      - run: npm run test:integration
        env:
          PGLENS_TEST_DB_URL: postgresql://pglens:pglens@localhost:5432/pglens_test

  e2e:
    name: e2e (playwright)
    runs-on: ubuntu-latest
    needs: [frontend-unit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: sudo apt-get update && sudo apt-get install -y libsecret-1-dev
      - run: npm ci
      - name: install client-next deps
        working-directory: client-next
        run: npm ci
      - name: build v3 client
        working-directory: client-next
        run: npm run build
      - name: install playwright browsers
        run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
        env:
          CI: '1'
